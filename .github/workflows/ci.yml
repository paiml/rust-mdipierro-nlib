name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  gate:
    name: Test + Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        run: cargo build --lib

      - name: Test
        run: cargo test --lib

  golden-vectors:
    name: Python/Rust Parity
    runs-on: ubuntu-latest
    needs: gate
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Regenerate golden vectors from Python
        run: python3 tests/generate_vectors.py

      - name: Check fixtures not drifted
        run: git diff --exit-code tests/fixtures/golden_vectors.json

      - name: Run golden vector tests
        run: cargo test --test golden_vectors

  examples:
    name: Examples
    runs-on: ubuntu-latest
    needs: gate
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Run all examples
        run: |
          for ex in sort stats matrix solve optimize integrate fourier random monte_carlo graph; do
            echo "::group::cargo run --example $ex"
            cargo run --example "$ex"
            echo "::endgroup::"
          done

  contracts:
    name: Contract Validation
    runs-on: ubuntu-latest
    needs: gate
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install pv
        run: cargo install provable-contracts-cli --version 0.3.1

      - name: Validate contracts
        run: |
          for f in contracts/*.yaml; do
            [ "$(basename "$f")" = "binding.yaml" ] && continue
            pv validate "$f"
          done

      - name: Score contracts
        run: pv score contracts/ --binding contracts/binding.yaml
